<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberia Quebrada Cementerio 10jun2026</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet Measure CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-measure@3.1.0/dist/leaflet-measure.css" />
    
    <!-- Leaflet Locate CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* Título central superior */
        .map-title {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            pointer-events: none; /* Permite interactuar con el mapa a través del cuadro si es necesario */
        }
        .map-title h1 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }
        .map-title h2 {
            margin: 5px 0 0;
            font-size: 14px;
            color: #555;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="map-title">
        <h1>Liberia Quebrada Cementerio 10jun2026</h1>
        <h2>58 fotos aprox georeferenciadas con 22 min vuelo</h2>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Measure JS -->
    <script src="https://unpkg.com/leaflet-measure@3.1.0/dist/leaflet-measure.js"></script>

    <!-- Leaflet Locate JS -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.js" charset="utf-8"></script>

    <script>
        // Inicializar el mapa
        var map = L.map('map', {
            zoomControl: false 
        }).setView([10.63, -85.44], 14);

        // 1. Botones en lado izquierdo superior
        L.control.zoom({ position: 'topleft' }).addTo(map);

        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);

        L.control.locate({
            position: 'topleft',
            strings: { title: "Mostrar mi ubicación" }
        }).addTo(map);

        // 2. Capas Base
        var osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        });

        var googleHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 22,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '© Google'
        });

        // Capas Overlay vacías inicialmente para que aparezcan en el control siempre
        var geojsonLayer = L.geoJSON(null, {
            style: function (feature) {
                return { color: "#ff0000", weight: 3, opacity: 0.8 };
            }
        });
        
        // 3. Capa del mosaico extraído (leyendo directamente desde la carpeta tiles/)
        // Esto elimina por completo la necesidad del archivo Quebpanteon.mbtiles y sql.js
        var mbtilesLayer = L.tileLayer('tiles/{z}/{x}/{y}.jpg', {
            minZoom: 12,
            maxZoom: 22,
            maxNativeZoom: 22,
            tms: false, // Ya convertimos las coordenadas Y en el script de extracción
            zIndex: 10,
            bounds: [[10.6321, -85.4414], [10.6444, -85.4295]] // Limitar las peticiones a la zona de las fotos
        });

        // Grupos de capas para el menú
        var baseMaps = {
            "OSM Standard": osmStandard,
            "Google Hybrid": googleHybrid
        };

        var overlayMaps = {
            "Río (GeoJSON)": geojsonLayer,
            "Mosaico de fotos": mbtilesLayer
        };

        // Añadir por defecto
        osmStandard.addTo(map);
        geojsonLayer.addTo(map);
        mbtilesLayer.addTo(map);

        // 4. Control de capas (arriba a la derecha, colapsado)
        var layerControl = L.control.layers(baseMaps, overlayMaps, {
            position: 'topright',
            collapsed: true
        }).addTo(map);

        // 5. Cargar archivo GeoJSON
        fetch('Quebpanteon.geojson')
            .then(response => {
                if (!response.ok) throw new Error("Error cargando GeoJSON");
                return response.json();
            })
            .then(data => {
                geojsonLayer.addData(data);
                map.fitBounds(geojsonLayer.getBounds());
            })
            .catch(error => console.error('Error al cargar el archivo GeoJSON:', error));

    </script>
</body>
</html>
