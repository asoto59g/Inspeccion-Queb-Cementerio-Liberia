            createTile: function (coords, done) {
                var tile = document.createElement('img');
                
                // Eventos obligatorios de Leaflet para mostrar la imagen y quitar opacidad 0
                L.DomEvent.on(tile, 'load', L.bind(this._tileOnLoad, this, done, tile));
                L.DomEvent.on(tile, 'error', L.bind(this._tileOnError, this, done, tile));

                if (this.options.crossOrigin || this.options.crossOrigin === '') {
                    tile.crossOrigin = this.options.crossOrigin === true ? '' : this.options.crossOrigin;
                }

                tile.setAttribute('role', 'presentation');

                if (!this.db) {
                    setTimeout(() => done('DB not loaded', tile), 0);
                    return tile;
                }

                var z = coords.z;
                var x = coords.x;
                // MBTiles usa formato TMS (la coordenada Y está invertida)
                var y = Math.pow(2, z) - 1 - coords.y;

                try {
                    var stmt = this.db.prepare('SELECT tile_data FROM tiles WHERE zoom_level = :z AND tile_column = :x AND tile_row = :y');

                    stmt.free();

                }
